name: Build and test
on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
      with:
        auto-update-conda: true
        auto-activate: true
        channels: defaults,conda-forge
        activate-environment: ""
    - name: Install build dependencies
      shell: bash -el {0}
      run: conda install -y conda-build sphinx pydata-sphinx-theme sphinx-copybutton sphinx-notfound-page
    - name: Build the documentation as a test
      shell: bash -el {0}
      run: cd docs && make html
    - name: Build the package
      shell: bash -el {0}
      run: conda build --no-test conda.recipe
    - name: Reduce the size of the build artifact
      shell: bash -el {0}
      run: rm -rf ${CONDA}/conda-bld/{git_cache,work,anaconda-project*,*/.cache}
    - name: Upload the build artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: package-${{ github.sha }}
        path: ${{ env.CONDA }}/conda-bld

  tests:
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}
    needs: package
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pyver: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
      with:
        auto-update-conda: true
        auto-activate: true
        channels: defaults,conda-forge
        activate-environment: ""
    - name: Download the build artifact
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: package-${{ github.sha }}
        path: ./conda-bld
    - name: Extract package version
      id: pkg_version
      shell: bash -el {0}
      run: |
        PKG=$(ls ./conda-bld/*/anaconda-project-* 2>/dev/null | head -1)
        echo "Found package: $PKG"
        VERSION=$(basename "$PKG" | cut -d '-' -f 3)
        echo "Extracted version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Build the test environment
      shell: bash -el {0}
      run: |
        conda config --append channels ./conda-bld
        conda create -y -n anaconda-project-dev python=${{ matrix.pyver }} \
          coverage pytest pytest-cov redis notebook bokeh \
          keyring setuptools pip "anaconda-project==${{ steps.pkg_version.outputs.version }}"
    - name: Run the tests
      shell: bash -el {0}
      run: |
        conda activate anaconda-project-dev
        pytest -vrfe --durations=10 \
          --cov-config=.coveragerc --cov-report=term-missing \
          --cov-fail-under=95 --cov-report=xml:./coverage.xml \
          --cov=anaconda_project anaconda_project

  upload:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
      with:
        auto-update-conda: true
        auto-activate: true
        channels: defaults
        activate-environment: ""
    - name: Download the build artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: package-${{ github.sha }}
        path: conda-bld
    - name: Upload to anaconda.org
      shell: bash -el {0}
      env:
        ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        GITHUB_REF: ${{ github.ref }}
      run: |
        conda install -y anaconda-client
        [[ "$GITHUB_REF" =~ ^refs/tags/ ]] || export LABEL="--label dev"
        anaconda --verbose --token $ANACONDA_TOKEN upload --user ctools $LABEL conda-bld/*/*.{conda,tar.bz2} --force
